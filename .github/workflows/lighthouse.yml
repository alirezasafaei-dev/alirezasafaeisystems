name: Lighthouse Budget

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: [self-hosted, linux, x64, asdev-ci]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          dest: ${{ runner.temp }}/setup-pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium for Lighthouse
        run: |
          pnpm exec playwright install chromium
          CHROME_PATH=$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")
          test -x "$CHROME_PATH"
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun --config=./lighthouserc.json
