name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'ai/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mother-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Self-hosted quality gate
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, x64, asdev-ci]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scan tracked source for secrets
        run: pnpm run scan:secrets

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Unit and integration tests
        run: pnpm run test

      - name: Production build
        run: pnpm run build

      - name: Enterprise gate
        run: pnpm run enterprise:gate

      - name: Install Playwright Chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
        run: pnpm exec playwright install chromium

      - name: Setup database
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: pnpm run db:push

      - name: Browser smoke
        env:
          CI: "true"
          DATABASE_URL: "file:./prisma/dev.db"
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
          PLAYWRIGHT_DISABLE_WEBSERVER: "true"
        run: |
          fuser -k 3100/tcp 2>/dev/null || true
          sleep 2
          PORT=3100 pnpm run start &
          npx wait-on http://127.0.0.1:3100 --timeout 120000
          pnpm exec playwright test e2e/smoke.spec.mjs --config=playwright.config.mjs --reporter=list --workers=1 --retries=1

      - name: Cleanup runner workspace
        if: always()
        run: |
          set -euo pipefail
          fuser -k 3100/tcp 2>/dev/null || true
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "${GITHUB_WORKSPACE:-}" ]; then
            find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true
          fi
          if [ -n "${RUNNER_TEMP:-}" ] && [ -d "${RUNNER_TEMP:-}" ]; then
            find "$RUNNER_TEMP" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true
          fi
