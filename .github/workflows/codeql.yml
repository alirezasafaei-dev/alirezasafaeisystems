name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    runs-on: [self-hosted, linux, x64, asdev-ci]
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        id: codeql-analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@v3

      - name: CodeQL upload warning
        if: ${{ steps.codeql-analyze.outcome == 'failure' }}
        run: |
          echo "CodeQL analysis upload failed (likely code scanning is not enabled for this repository)."
          echo "Enable GitHub Advanced Security / code scanning in repository settings to enforce this gate."
